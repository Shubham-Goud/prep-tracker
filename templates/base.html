<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}{% endblock %}</title>

<style>

/* GLOBAL */
body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#0f172a;
    color:#e2e8f0;
    display:flex;
    animation: fadeIn 0.6s ease;
}

/* FADE ANIMATION */
@keyframes fadeIn {
    from { opacity:0; transform: translateY(10px); }
    to { opacity:1; transform: translateY(0); }
}

/* SIDEBAR */
.sidebar {
    width:230px;
    height:100vh;
    background:#020617;
    padding:20px;
    box-shadow:2px 0 10px rgba(0,0,0,0.4);
}

.sidebar h2 {
    margin-bottom:20px;
}

.sidebar a {
    display:block;
    color:#94a3b8;
    text-decoration:none;
    margin:12px 0;
    transition:0.3s;
}

.sidebar a:hover {
    color:white;
    transform:translateX(5px);
}

/* MAIN */
.main {
    flex:1;
    padding:30px;
}

/* CARD */
.card {
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* BUTTON */
.btn {
    background:#3b82f6;
    padding:8px 14px;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover {
    background:#2563eb;
    transform:scale(1.05);
}

.success {
    background:#22c55e;
}

.success:hover {
    background:#16a34a;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
    gap:12px;
}

/* DAY CARD */
.day {
    padding:15px;
    background:#1e293b;
    text-align:center;
    border-radius:8px;
    transition:0.3s;
}

.day:hover {
    transform:scale(1.05);
}

.day.done {
    background:#22c55e;
}

/* PROBLEM */
.problem {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#020617;
    padding:12px;
    border-radius:8px;
    margin:10px 0;
    transition:0.3s;
}

.problem:hover {
    transform:translateX(5px);
    background:#020617cc;
}

</style>

</head>

<body>

<div class="sidebar">
    <h2>🚀 PrepTracker</h2>

    <a href="/">🏠 Home</a>
    <a href="/dashboard">📊 DSA</a>
    <a href="/sql">🗄️ SQL</a>
</div>

<div class="main">
{% block content %}{% endblock %}
</div>

</body>
</html>
